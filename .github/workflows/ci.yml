name: CI — Build & Test

on:
  pull_request:
    branches: [ "main", "release/*" ]
  push:
    branches: [ "main", "release/*" ]

jobs:
  build:
    name: CI — Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # IMPORTANT: Replace this step with your actual build and test commands!
      # E.g., npm install && npm test 
      # E.g., mvn clean test
      - name: Run Build and Tests
        run: |
          echo "Running mandatory CI checks..."
          echo "✅ Build Successful"
          echo "✅ Tests Passed"
          # Simulating test results generation for Evidence
          echo "<testsuites></testsuites>" > test-results.xml

      - name: Upload Test Results Evidence
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.xml
          retention-days: 14
